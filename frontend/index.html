  <main class="page">
    <section class="hero">
      <h1>Zodiac Sign Finder</h1>
      <p>Enter your birth month and day to see your zodiac sign.</p>
    </section>

    <section class="card">
      <h2>Find your sign</h2>
      <form class="sign-form" id="zodiac-form">
        <label for="month">Birth month</label>
        <select id="month" name="month" required>
          <option value="">Select month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>

        <label for="day">Birth day</label>
        <input id="day" name="day" type="number" min="1" max="31" placeholder="e.g. 14" required />

        <button type="submit">Get my sign</button>
      </form>
      <p class="help-text">Enter your birthday and get your zodiac sign instantly on this page.</p>
      <div class="result hidden" id="result" aria-live="polite"></div>
      <!-- <button type="button" class="explore-btn" id="explore-btn">
        Explore all zodiac signs
      </button> -->
    </section>

    </section>
